<!doctype html>
<html lang="en">
  {% include head.html %}
  <body class="{{ page.url | replace:'/','' }}">
    <div id="wrapper">
      {% include simple-header.html %}
      <section class="sub-header">
        <div class="container">
          <h1>{{ page.title }}</h1>
        </div>
      </section>
      
      <div class="container has-sidebar">
        {% include sidebar.html %}
        <section class="main">
          {{ content }}
        </section>
      </div>
      <div id="map"></div>
    </div> <!-- #wrapper -->
    {% include footer.html %}
    {% include nav.html %}
    <script src="/assets/js/app.js"></script>
  </body>
</html>
